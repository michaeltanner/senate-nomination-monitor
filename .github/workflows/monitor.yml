name: Monitor Senate Confirmation

on:
  schedule:
    # Run four times a day (every 6 hours)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual runs from the GitHub UI

permissions:
  contents: write # Needed to commit and push status.json back

jobs:
  check-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run monitor script
        id: run_monitor
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          python monitor.py

      - name: Commit and push if status changed
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          # Only add if files exist to prevent shell expansion errors
          if ls status_*.json 1> /dev/null 2>&1; then
            git add status_*.json
          fi
          if [ -f history_log.txt ]; then
            git add history_log.txt
          fi
          # Only commit and push if there are changes to commit
          if ! git diff --cached --quiet; then
            git commit -m "chore: update nomination status [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
